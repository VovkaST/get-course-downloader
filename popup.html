<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GetCourse Video Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <!-- Заголовок -->
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="white" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <h1>GetCourse Video Downloader</h1>
    </header>

    <!-- Состояние: загрузка данных -->
    <div id="loading-state" class="state">
      <div class="loading-container">
        <div class="spinner"></div>
        <p class="loading-text" id="loading-text">Поиск видео на странице...</p>
        <p class="loading-hint" id="loading-hint"></p>
      </div>
    </div>

    <!-- Состояние: нет видео -->
    <div id="empty-state" class="state hidden">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#4b5563" stroke-width="1.5" />
          <path d="M10 9l5 3-5 3V9z" stroke="#6b7280" stroke-width="1.5" stroke-linejoin="round" />
        </svg>
      </div>
      <p class="empty-text">Видео не обнаружены</p>
      <p class="empty-hint">Откройте страницу с видео на GetCourse и обновите её</p>
    </div>

    <!-- Состояние: список видео -->
    <div id="video-list-state" class="state hidden">
      <div class="section-label">Обнаруженные видео</div>
      <div id="video-list" class="video-list"></div>
    </div>

    <!-- Состояние: выбор разрешения и имени файла -->
    <div id="download-setup-state" class="state hidden">
      <button id="btn-back" class="btn-back" title="Назад к списку" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5m0 0l7 7m-7-7l7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
        <span>Назад</span>
      </button>

      <div class="section-label">Выберите разрешение</div>
      <div id="resolution-list" class="resolution-list"></div>

      <!-- Поле ввода имени файла удалено по просьбе пользователя -->

      <button id="btn-download" class="btn-download" disabled type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Начать загрузку</span>
      </button>
    </div>

    <!-- Состояние: загрузка -->
    <div id="download-progress-state" class="state hidden">
      <div class="progress-header">
        <div class="progress-filename" id="progress-filename"></div>
        <div class="progress-status" id="progress-status">Подготовка...</div>
      </div>

      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar">
          <div class="progress-bar-fill" id="progress-bar-fill"></div>
          <div class="progress-bar-glow" id="progress-bar-glow"></div>
        </div>
        <div class="progress-percent" id="progress-percent">0%</div>
      </div>

      <div class="progress-details">
        <span id="progress-chunks">0 / 0 чанков</span>
        <span id="progress-size">0 МБ</span>
        <span id="progress-threads"></span>
      </div>

      <button id="btn-cancel" class="btn-cancel" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <span>Отменить загрузку</span>
      </button>
    </div>

    <!-- Состояние: завершено -->
    <div id="done-state" class="state hidden">
      <div class="done-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#22c55e" stroke-width="1.5" />
          <path d="M8 12l3 3 5-5" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <p class="done-text">Загрузка завершена!</p>
      <p class="done-filename" id="done-filename"></p>
      <button id="btn-new-download" class="btn-secondary" type="button">Скачать другое видео</button>
    </div>

    <!-- Состояние: ошибка -->
    <div id="error-state" class="state hidden">
      <div class="error-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#ef4444" stroke-width="1.5" />
          <path d="M15 9l-6 6m0-6l6 6" stroke="#ef4444" stroke-width="2" stroke-linecap="round" />
        </svg>
      </div>
      <p class="error-text">Ошибка загрузки</p>
      <p class="error-message" id="error-message"></p>
      <button id="btn-retry" class="btn-secondary" type="button">Попробовать снова</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
